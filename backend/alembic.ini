# alembic.ini — Alembic configuration for LogistiQ AI backend
#
# This file is read by `alembic` CLI when run from the backend/ directory.
# The DATABASE_URL is loaded from the environment at runtime via env.py,
# so the sqlalchemy.url below is just a placeholder that gets overridden.
#
# Usage:
#   cd backend
#   alembic upgrade head          # apply all migrations
#   alembic downgrade -1          # roll back one revision
#   alembic revision --autogenerate -m "add_column_foo"   # generate new migration

[alembic]
# Path to the alembic environment script and versions directory
script_location = db/migrations

# Template for new revision files
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Maximum length of revision message in filename
truncate_slug_length = 40

# Placeholder — overridden by env.py using settings.DATABASE_URL
sqlalchemy.url = postgresql+asyncpg://logistiq:dev_secret_123@localhost:5432/logistiq

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
